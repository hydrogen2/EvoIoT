# EvoIoT Mosquitto Configuration

# =============================================================================
# Listeners
# =============================================================================
listener 1883
protocol mqtt

# WebSocket listener (for browser clients)
listener 9001
protocol websockets

# =============================================================================
# Security (development mode - auth disabled)
# =============================================================================
# In production, enable JWT authentication:
# auth_plugin /usr/lib/mosquitto_jwt_auth.so
# auth_opt_jwt_secret_file /mosquitto/config/jwt_secret

allow_anonymous true

# =============================================================================
# Persistence
# =============================================================================
persistence true
persistence_location /mosquitto/data/

# Retain messages for discovery payloads
retain_available true

# =============================================================================
# Logging
# =============================================================================
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

connection_messages true
log_timestamp true

# =============================================================================
# Performance
# =============================================================================
max_inflight_messages 100
max_queued_messages 1000
message_size_limit 1048576

# =============================================================================
# Topics ACL (development - all allowed)
# =============================================================================
# In production, use dynamic security plugin with JWT claims:
# acl_file /mosquitto/config/acl.conf
