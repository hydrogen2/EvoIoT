# Telemetry Stream - MQTT to TimescaleDB
# Subscribes to telemetry topic and writes readings to TimescaleDB

input:
  mqtt:
    urls:
      - tcp://mosquitto:1883
    topics:
      - "buildings/+/agents/+/telemetry"
    client_id: "platform-telemetry"
    qos: 1
    auto_replay_nacks: true

pipeline:
  processors:
    # Add metadata and compute rawtag_id
    - mapping: |
        root = this
        root.id = uuid_v4()
        root.source_type = "sensor"
        root.scope = "device"
        root.confidence = 1.0
        root.created_at = now()
        root.raw_payload = this.string()
        # Compute rawtag_id from source fields (BACnet format)
        # Format: bacnet:{building_id}:device-{device_id}:{object_type}:{object_instance}
        root.rawtag_id = "bacnet:" + this.building_id + ":device-" + this.device_id + ":" + this.object_type + ":" + this.object_instance.string()

output:
  broker:
    pattern: fan_out
    outputs:
      # Insert reading into TimescaleDB
      - sql_insert:
          driver: postgres
          dsn: "postgres://bento_writer:bento_dev_password@postgres:5432/postgres?sslmode=disable"
          table: evoiot.readings
          columns:
            - id
            - building_id
            - source_type
            - scope
            - device_id
            - rawtag_id
            - point_type
            - value
            - unit
            - raw_payload
            - agent_read_at
            - confidence
          args_mapping: |
            root = [
              this.id,
              this.building_id,
              this.source_type,
              this.scope,
              this.device_id,
              this.rawtag_id,
              this.point_type,
              this.value,
              this.unit,
              this.raw_payload,
              this.agent_read_at,
              this.confidence
            ]
          batching:
            count: 100
            period: 1s
      # Upsert RawTag in AGE graph (ensures node exists for classification)
      - sql_raw:
          driver: postgres
          dsn: "postgres://bento_writer:bento_dev_password@postgres:5432/postgres?sslmode=disable"
          query: "SELECT evoiot.upsert_rawtag($1, $2, $3, $4, $5, $6)"
          args_mapping: |
            root = [
              this.rawtag_id,
              this.building_id,
              this.device_id,
              this.object_type,
              this.object_instance.string(),
              ""
            ]
