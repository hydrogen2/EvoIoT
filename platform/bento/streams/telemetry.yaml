# Telemetry Stream - MQTT to TimescaleDB
# Subscribes to telemetry topic and writes readings to TimescaleDB

input:
  mqtt:
    urls:
      - tcp://mosquitto:1883
    topics:
      - "buildings/+/agents/+/telemetry"
    client_id: "platform-telemetry"
    qos: 1
    auto_replay_nacks: true

pipeline:
  processors:
    # Add metadata - rawtag_id computed by PostgreSQL trigger using externalized template
    - mapping: |
        root = this
        root.id = uuid_v4()
        root.source_type = "sensor"
        root.scope = "device"
        root.confidence = 1.0
        root.created_at = now()
        root.raw_payload = this.string()
        # rawtag_id computed by PostgreSQL trigger from data_sources.rawtag_id_template

output:
  broker:
    pattern: fan_out
    outputs:
      # Insert reading into TimescaleDB (rawtag_id computed by trigger from template)
      - sql_insert:
          driver: postgres
          dsn: "postgres://bento_writer:bento_dev_password@postgres:5432/postgres?sslmode=disable"
          table: evoiot.readings
          columns:
            - id
            - building_id
            - source_type
            - scope
            - device_id
            - point_type
            - value
            - unit
            - raw_payload
            - agent_read_at
            - confidence
          args_mapping: |
            root = [
              this.id,
              this.building_id,
              this.source_type,
              this.scope,
              this.device_id,
              this.point_type,
              this.value,
              this.unit,
              this.raw_payload,
              this.agent_read_at,
              this.confidence
            ]
          batching:
            count: 100
            period: 1s
      # Upsert RawTag in AGE graph (rawtag_id computed from template internally)
      - sql_raw:
          driver: postgres
          dsn: "postgres://bento_writer:bento_dev_password@postgres:5432/postgres?sslmode=disable"
          query: "SELECT evoiot.upsert_rawtag($1, $2, $3, $4, $5)"
          args_mapping: |
            root = [
              this.building_id,
              this.source_id,
              this.device_id,
              this.object_type,
              this.object_instance.string()
            ]
