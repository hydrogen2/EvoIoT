# EvoIoT Zitadel Configuration

Log:
  Level: info
  Formatter:
    Format: text

# External domain configuration
ExternalDomain: localhost
ExternalPort: 8085
ExternalSecure: false

# Database connection (uses same Postgres instance)
Database:
  postgres:
    Host: postgres
    Port: 5432
    Database: zitadel
    User:
      Username: zitadel
      Password: zitadel_dev_password
    Admin:
      Username: postgres
      Password: postgres
    MaxOpenConns: 25
    MaxIdleConns: 10
    MaxConnLifetime: 1h
    MaxConnIdleTime: 5m
    Options: ""

# Machine keys for first admin
FirstInstance:
  Org:
    Name: EvoIoT
    Human:
      UserName: admin@evoiot.local
      FirstName: Admin
      LastName: User
      Password: Admin123!
      PasswordChangeRequired: false

# Default settings
DefaultInstance:
  OIDCSettings:
    AccessTokenLifetime: 12h
    IdTokenLifetime: 12h
    RefreshTokenIdleExpiration: 720h
    RefreshTokenExpiration: 720h

# Telemetry disabled
Telemetry:
  Enabled: false

# Projections for eventual consistency
Projections:
  RequeueEvery: 60s
  RetryFailedAfter: 1s
  MaxFailureCount: 5
  ConcurrentInstances: 1
  BulkLimit: 200
