[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

[program:init-db]
command=python3 /scripts/init_db.py
autorestart=false
startsecs=0
startretries=1
priority=1
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:discover]
command=python3 /scripts/discover.py
autostart=true
autorestart=true
startsecs=5
startretries=999
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:poller]
command=python3 /scripts/poller.py
autostart=true
autorestart=true
startsecs=10
startretries=999
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:bento]
command=/usr/local/bin/bento streams /config/streams
autostart=true
autorestart=true
startsecs=5
startretries=999
priority=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
