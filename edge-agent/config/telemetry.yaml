# EvoIoT Edge Agent - Telemetry Pipeline (Step 3 - Synthetic Data)
# Generates fake BACnet-like readings and publishes to MQTT

input:
  generate:
    interval: 5s
    count: 0  # Infinite
    mapping: |
      # Simulate a building with multiple devices
      let building_id = "bldg-001"
      let agent_id = "agent-001"

      # Randomly select a device to report
      let devices = [
        {"device_id": "ahu-01", "device_type": "AHU", "name": "AHU-1 Main Lobby"},
        {"device_id": "ahu-02", "device_type": "AHU", "name": "AHU-2 Office Wing"},
        {"device_id": "vav-01", "device_type": "VAV", "name": "VAV-1 Conference Room A"},
        {"device_id": "vav-02", "device_type": "VAV", "name": "VAV-2 Conference Room B"},
        {"device_id": "vav-03", "device_type": "VAV", "name": "VAV-3 Open Office"},
        {"device_id": "chiller-01", "device_type": "Chiller", "name": "Chiller-1 Primary"},
        {"device_id": "pump-01", "device_type": "Pump", "name": "CHWP-1 Primary"},
        {"device_id": "pump-02", "device_type": "Pump", "name": "CHWP-2 Secondary"},
        {"device_id": "ct-01", "device_type": "CoolingTower", "name": "CT-1"},
        {"device_id": "meter-01", "device_type": "ElectricMeter", "name": "Main Electric Meter"}
      ]
      let device = $devices.index(random_int() % $devices.length())

      # Generate readings based on device type
      let readings = match $device.device_type {
        "AHU" => [
          {"point_type": "supply_air_temp", "value": 12.5 + (random_int() % 30) / 10.0, "unit": "celsius"},
          {"point_type": "return_air_temp", "value": 22.0 + (random_int() % 40) / 10.0, "unit": "celsius"},
          {"point_type": "mixed_air_temp", "value": 18.0 + (random_int() % 30) / 10.0, "unit": "celsius"},
          {"point_type": "supply_air_temp_setpoint", "value": 13.0, "unit": "celsius"},
          {"point_type": "duct_static_pressure", "value": 200 + (random_int() % 100), "unit": "pascal"},
          {"point_type": "fan_speed", "value": 60 + (random_int() % 35), "unit": "percent"},
          {"point_type": "damper_position", "value": 40 + (random_int() % 50), "unit": "percent"},
          {"point_type": "on_off_status", "value": 1, "unit": "binary"},
          {"point_type": "power_kw", "value": 15.0 + (random_int() % 100) / 10.0, "unit": "kW"}
        ],
        "VAV" => [
          {"point_type": "zone_air_temp", "value": 21.5 + (random_int() % 40) / 10.0, "unit": "celsius"},
          {"point_type": "zone_temp_setpoint", "value": 22.0, "unit": "celsius"},
          {"point_type": "discharge_air_temp", "value": 14.0 + (random_int() % 20) / 10.0, "unit": "celsius"},
          {"point_type": "air_flow_rate", "value": 200 + (random_int() % 300), "unit": "cfm"},
          {"point_type": "damper_position", "value": 30 + (random_int() % 60), "unit": "percent"},
          {"point_type": "co2_level", "value": 400 + (random_int() % 400), "unit": "ppm"},
          {"point_type": "occupancy_status", "value": (random_int() % 2), "unit": "binary"}
        ],
        "Chiller" => [
          {"point_type": "chilled_water_supply_temp", "value": 6.5 + (random_int() % 15) / 10.0, "unit": "celsius"},
          {"point_type": "chilled_water_return_temp", "value": 12.0 + (random_int() % 20) / 10.0, "unit": "celsius"},
          {"point_type": "condenser_water_supply_temp", "value": 29.0 + (random_int() % 30) / 10.0, "unit": "celsius"},
          {"point_type": "condenser_water_return_temp", "value": 34.0 + (random_int() % 30) / 10.0, "unit": "celsius"},
          {"point_type": "power_kw", "value": 150.0 + (random_int() % 500) / 10.0, "unit": "kW"},
          {"point_type": "cop", "value": 4.5 + (random_int() % 20) / 10.0, "unit": "ratio"},
          {"point_type": "on_off_status", "value": 1, "unit": "binary"},
          {"point_type": "fault_status", "value": 0, "unit": "binary"}
        ],
        "Pump" => [
          {"point_type": "pump_speed", "value": 70 + (random_int() % 25), "unit": "percent"},
          {"point_type": "water_flow_rate", "value": 100 + (random_int() % 150), "unit": "gpm"},
          {"point_type": "differential_pressure", "value": 80 + (random_int() % 40), "unit": "pascal"},
          {"point_type": "power_kw", "value": 5.0 + (random_int() % 50) / 10.0, "unit": "kW"},
          {"point_type": "on_off_status", "value": 1, "unit": "binary"}
        ],
        "CoolingTower" => [
          {"point_type": "condenser_water_supply_temp", "value": 28.0 + (random_int() % 30) / 10.0, "unit": "celsius"},
          {"point_type": "condenser_water_return_temp", "value": 33.0 + (random_int() % 30) / 10.0, "unit": "celsius"},
          {"point_type": "fan_speed", "value": 50 + (random_int() % 45), "unit": "percent"},
          {"point_type": "power_kw", "value": 8.0 + (random_int() % 40) / 10.0, "unit": "kW"},
          {"point_type": "on_off_status", "value": 1, "unit": "binary"}
        ],
        "ElectricMeter" => [
          {"point_type": "power_kw", "value": 250.0 + (random_int() % 1000) / 10.0, "unit": "kW"},
          {"point_type": "energy_kwh", "value": 15000.0 + (random_int() % 100), "unit": "kWh"},
          {"point_type": "power_factor", "value": 0.85 + (random_int() % 10) / 100.0, "unit": "ratio"}
        ],
        _ => [
          {"point_type": "on_off_status", "value": 1, "unit": "binary"}
        ]
      }

      # Pick one reading to send
      let reading = $readings.index(random_int() % $readings.length())

      root.building_id = $building_id
      root.agent_id = $agent_id
      root.device_id = $device.device_id
      root.device_type = $device.device_type
      root.device_name = $device.name
      root.point_type = $reading.point_type
      root.value = $reading.value
      root.unit = $reading.unit
      root.agent_read_at = now()
      root.clock_quality = "ntp_synced"

pipeline:
  processors:
    - log:
        level: DEBUG
        message: "Publishing reading: ${! json() }"

output:
  mqtt:
    urls:
      - tcp://mosquitto:1883
    topic: 'buildings/${! json("building_id") }/agents/${! json("agent_id") }/telemetry'
    qos: 1
    client_id: "edge-agent-telemetry"
